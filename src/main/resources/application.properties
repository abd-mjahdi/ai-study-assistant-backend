spring.config.import=optional:classpath:application-local.properties

spring.application.name=ai-study-assistant
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/aiassistant}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-flash-latest}

# CORS (use patterns so Android dev origins can be allowed easily)
cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:*}

# Server-level request size guard (applies to POST /api/study/generate)
http.request.max-bytes=${HTTP_REQUEST_MAX_BYTES:131072}

# HTTP client timeouts (Gemini calls)
http.client.connect-timeout-ms=${HTTP_CLIENT_CONNECT_TIMEOUT_MS:3000}
http.client.read-timeout-ms=${HTTP_CLIENT_READ_TIMEOUT_MS:15000}

# Gemini retry/backoff for transient errors (429/5xx/timeouts)
gemini.retry.max-attempts=${GEMINI_RETRY_MAX_ATTEMPTS:3}
gemini.retry.base-backoff-ms=${GEMINI_RETRY_BASE_BACKOFF_MS:400}

# Rate limit for /api/study/generate (per user)
ratelimit.generate.capacity=${RATE_LIMIT_GENERATE_CAPACITY:10}
ratelimit.generate.refill-seconds=${RATE_LIMIT_GENERATE_REFILL_SECONDS:60}