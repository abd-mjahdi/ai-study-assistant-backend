services:
  db:
    image: postgres:16-alpine
    container_name: ai-study-assistant-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiassistant}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-study-assistant-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-aiassistant}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}

      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-flash-latest}

      # Allow Android emulator/dev by default; override in prod
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-*}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:
